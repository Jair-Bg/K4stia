<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kastia — Trade the Chaos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="site-nav">
    <a class="nav-logo" href="#markets">Kastia<span class="nav-logo-dot">.</span></a>

    <form class="nav-search-form" id="search-form" role="search">
      <label class="search-input-wrap" for="search-input">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          name="query"
          type="search"
          placeholder="Search markets…"
          autocomplete="off"
        />
      </label>
      <button type="button" class="clear-btn" id="clear-search">Clear</button>
    </form>

    <div class="nav-actions">
      <button type="button" class="btn-ghost">Sign in</button>
      <button type="button" class="btn-primary">Connect Wallet</button>
    </div>
  </nav>

  <!-- ── CATEGORY BAR ── -->
  <div class="category-bar" role="navigation" aria-label="Market categories">
    <div class="category-inner" id="markets-filters">
      <button class="cat-btn active" type="button" data-filter="all">All</button>
      <button class="cat-btn" type="button" data-filter="politics">Politics</button>
      <button class="cat-btn" type="button" data-filter="crypto">Crypto</button>
      <button class="cat-btn" type="button" data-filter="sports">Sports</button>
      <button class="cat-btn" type="button" data-filter="finance">Finance</button>
      <button class="cat-btn" type="button" data-filter="world">World</button>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <main class="main-wrap">
    <section class="markets" id="markets">

      <!-- toolbar -->
      <div class="results-toolbar">
        <div class="toolbar-left">
          <span class="status-dot-wrap">
            <span class="status-dot" id="status-dot"></span>
          </span>
          <span class="status-meta">
            <span id="status-pill" class="status-pill">Loading</span>
            <span class="sep">—</span>
            <span id="source-name">db.json</span>
            <span class="bull">&bull;</span>
            <span id="market-count">0</span>&nbsp;markets
          </span>
        </div>
        <button class="refresh-btn" id="refresh-btn" type="button">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
        
        </button>
      </div>

      <p class="status-banner" id="status-banner" role="status" aria-live="polite"></p>
      <p class="results-summary" id="results-summary"></p>

      <!-- grid -->
      <div class="markets-grid" id="markets-grid" aria-live="polite">
        <article class="loading-state">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading markets…</p>
        </article>
      </div>

    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
