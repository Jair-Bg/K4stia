<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kastia - Trade the Chaos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="site-nav">
        <a class="nav-logo" href="#markets" aria-label="Kastia">Kastia</a>
        <form class="nav-search-form" id="search-form">
            <label class="search-input-wrap nav-search-wrap" for="search-input">
                <span class="material-symbols-outlined" aria-hidden="true">search</span>
                <input
                    id="search-input"
                    name="query"
                    type="search"
                    placeholder="Search Markets"
                    autocomplete="off"
                >
            </label>
            <button type="submit" class="search-btn">Search</button>
        </form>
    </nav>

    <main id="top">
        <section class="markets" id="markets">
           
            <div class="search-panel" id="search-panel">
                <div class="markets-filters" id="markets-filters" aria-label="Market categories">
                    <button class="filter-btn active" type="button" data-filter="all">All</button>
                    <button class="filter-btn" type="button" data-filter="politics">Politics</button>
                    <button class="filter-btn" type="button" data-filter="crypto">Crypto</button>
                    <button class="filter-btn" type="button" data-filter="sports">Sports</button>
                    <button class="filter-btn" type="button" data-filter="finance">Finance</button>
                    <button class="filter-btn" type="button" data-filter="world">World</button>
                </div>
            </div>

            <div class="results-toolbar">
                <p class="results-summary" id="results-summary">Loading markets...</p>
                <button class="refresh-btn" id="refresh-btn" type="button">Refresh data</button>
            </div>

            <div class="status-banner" id="status-banner" role="status" aria-live="polite"></div>

            <div class="markets-grid" id="markets-grid" aria-live="polite">
                <article class="loading-state">
                    <div class="spinner" aria-hidden="true"></div>
                </article>
            </div>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
